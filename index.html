<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Exclusive Collab Drop</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050505;
    color: white;
    overflow-x: hidden;
}

/* 🔥 animowane tło */
.bg {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(255,255,255,0.05), transparent 40%);
    animation: moveBg 10s linear infinite;
    z-index: -1;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-5%, -5%); }
    100% { transform: translate(0,0); }
}

/* wejście */
.fade {
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 50px 20px;
    text-align: center;
}

/* badge */
.badge {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: white;
    color: black;
    font-size: 12px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

h1 {
    font-size: 42px;
    margin: 15px 0;
}

.subtitle {
    opacity: 0.7;
}

/* karta */
.card {
    margin-top: 30px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 60px rgba(255,255,255,0.08);
}

audio {
    width: 100%;
    margin-top: 20px;
}

/* button */
.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 24px;
    border-radius: 12px;
    background: white;
    color: black;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.button:hover {
    transform: scale(1.07);
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 30px;
}

.box {
    padding: 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.08);
}

.small {
    font-size: 12px;
    opacity: 0.7;
}

a { color: white; }
</style>

</head>

<body>

<div class="bg"></div>

<div class="container fade">

<div class="badge">🔥 LIMITED COLLAB DROP</div>

<h1>🎵 Exclusive Beat</h1>
<p class="subtitle">Streetwear x Music collaboration experience</p>

<div class="card">

<audio controls>
  <source src="beat.mp3" type="audio/mpeg">
</audio>

<br>

<a class="button" href="beat.mp3" download>⬇ Pobierz Beat</a>

</div>

<div class="grid">

<div class="box">
<h3>👕 Brand</h3>
<p><b>Illegallove</b></p>
<p class="small">TikTok: @Illegallove<br>IG: @illegal.love</p>
</div>

<div class="box">
<h3>🎧 Producer</h3>
<p><b>Filxz</b></p>
<p class="small">TikTok: @prod.byfilxzz<br>IG: @prod.filxz</p>
</div>

</div>

</div>

</body>
</html>
