<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Exclusive Drop</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 50px 20px;
}

.badge {
    display: inline-block;
    padding: 6px 12px;
    background: #ffffff;
    color: black;
    border-radius: 20px;
    font-size: 12px;
    margin-bottom: 20px;
}

.card {
    background: #111;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
}

audio {
    width: 100%;
    margin-top: 20px;
}

.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
}

.section {
    margin-top: 25px;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 15px;
}

.small {
    font-size: 13px;
    opacity: 0.7;
}
</style>

</head>

<body>

<div class="container">

<div class="badge">🔥 LIMITED COLLAB DROP</div>

<div class="card">

<h1>🎵 Exclusive Beat</h1>
<p>Stworzony specjalnie dla klientów tej marki</p>

<audio controls>
  <source src="beat.mp3" type="audio/mpeg">
</audio>

<br>

<a class="button" href="beat.mp3" download>⬇ Pobierz Beat</a>

<div class="section">
<h3>👕 Brand</h3>
<p>𝐈𝐧𝐬𝐭𝐚𝐠𝐫𝐚𝐦 illegal.love1</p>
<p>𝗧𝗶𝗸 𝗧𝗼𝗸 Illegallove</p>
<p class="small">Official collaboration partner</p>
</div>

<div class="section">
<h3>🎧 Producer</h3>
<p>𝐈𝐧𝐬𝐭𝐚𝐠𝐫𝐚𝐦 prod.filxz</p>
<p>𝗧𝗶𝗸 𝗧𝗼𝗸 prod.byfilxzz</p>
<p class="small">Beat by independent producer</p>
</div>

</div>

</div>

</body>
</html>
